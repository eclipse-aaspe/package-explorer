# Blazor Explorer — lokal bauen und starten
#
#   docker compose build
#   docker compose up
#
# Branch: vorher im Repo auschecken. Remote-Build siehe src/docker/README-docker-explorer.md

services:
  blazor-explorer:
    build:
      context: .
      dockerfile: src/docker/Dockerfile-AasxPackageExplorerBlazor
    # Gleiches Namensschema wie Server: adminshellio/aasx-server-blazor-for-demo:develop
    image: adminshellio/aasx-package-explorer-blazor-for-demo:develop
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    # Standard: Im Image liegen BlazorExplorer.options.json (Release-Quelle) und options-debug.MIHO.json
    # neben BlazorExplorer.dll. Zusätzliche JSON-Datei einlesen (wie Windows-Profil „BlazorUI“):
    #   command: ["dotnet", "BlazorExplorer.dll", "-read-json", "options-debug.MIHO.json"]
    # Optional: eigene Default-Optionen statt eingebetteter Release-Datei:
    # volumes:
    #   - ./my-options.json:/app/BlazorExplorer.options.json:ro
    #   - ./options-debug.MIHO.json:/app/options-debug.MIHO.json:ro
